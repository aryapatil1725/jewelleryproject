<!DOCTYPE html>
<html>
<head>
    <title>Add Order</title>
    <link href="../static/bootstrap.css" rel="stylesheet"/>
    <link href="../static/style.css" rel="stylesheet"/>
</head>
<body>

<div class="container mt-5">
    <div class="card" style="max-width: 700px; margin: 0 auto;">
        <div class="card-header">
            <h3 class="mb-0">📋 Add Order</h3>
        </div>
        <div class="card-body">
            <form method="post">

                <div class="mb-3">
                    <label class="form-label">Customer</label>
                    <select name="customerid" class="form-control" required>
                        <option value="">Select Customer</option>
                        {% for c in customerlist %}
                            <option value="{{ c.CustomerID }}">{{ c.FirstName }} {{ c.LastName }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Order Date</label>
                    <input type="date" name="orderdate" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Total Amount</label>
                    <input type="text" name="total" class="form-control" placeholder="Enter total amount" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Labour Charges</label>
                    <input type="text" name="labour" class="form-control" placeholder="Enter labour charges" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">GST</label>
                    <input type="text" name="gst" class="form-control" placeholder="Enter GST amount" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Grand Total</label>
                    <input type="text" name="grand" class="form-control" placeholder="Enter grand total" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                         Save Order
                    </button>
                    <a href="/orderlist" class="btn btn-info">
                         Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
