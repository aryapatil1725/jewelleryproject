<!DOCTYPE html>
<html>
<head>
    <title>Add Order Details</title>
    <link href="../static/bootstrap.css" rel="stylesheet"/>
    <link href="../static/style.css" rel="stylesheet"/>
</head>
<body>

<div class="container mt-5">
    <div class="card" style="max-width: 700px; margin: 0 auto;">
        <div class="card-header">
            <h3 class="mb-0">📦 Add Order Details</h3>
        </div>
        <div class="card-body">
            <form method="post">

                <div class="mb-3">
                    <label class="form-label">Order</label>
                    <select name="orderid" class="form-control" required>
                        <option value="">Select Order</option>
                        {% for o in orderlist %}
                            <option value="{{ o.OrderID }}">Order #{{ o.OrderID }} - {{ o.FirstName }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Product</label>
                    <select name="productid" class="form-control" required>
                        <option value="">Select Product</option>
                        {% for p in productlist %}
                            <option value="{{ p.ProductID }}">{{ p.ProductName }} ({{ p.TypeName }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" name="qty" class="form-control" placeholder="Enter quantity" min="1" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Rate</label>
                    <input type="text" name="rate" class="form-control" placeholder="Enter rate" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Subtotal</label>
                    <input type="text" name="subtotal" class="form-control" placeholder="Enter subtotal" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        Save Details
                    </button>
                    <a href="/orderdetailslist" class="btn btn-info">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
