<!DOCTYPE html>
<html>
<head>
    <title>Customer List</title>
    <link href="../static/bootstrap.css" rel="stylesheet"/>
    <link href="../static/style.css" rel="stylesheet"/>
</head>
<body>

<div class="container mt-5">
    <div class="card">
        <div class="card-header">
            <h3 class="mb-0">👥 Customer List</h3>
        </div>
        <div class="card-body">
            <a href="/customer/add" class="btn btn-primary mb-3">
                <i class="fas fa-plus"></i> Add Customer
            </a>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for c in customers %}
                        <tr>
                            <td><strong>{{ c.CustomerID }}</strong></td>
                            <td>{{ c.FirstName }}</td>
                            <td>{{ c.LastName }}</td>
                            <td>{{ c.PhoneNumber }}</td>
                            <td>{{ c.Email }}</td>
                            <td>
                                <a href="/customer/edit/{{ c.CustomerID }}" class="btn btn-warning btn-sm">
                                    Edit
                                </a>
                                <a href="/customer/delete/{{ c.CustomerID }}" class="btn btn-danger btn-sm" 
                                   onclick="return confirm('Are you sure you want to delete this customer?')">
                                    Delete
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
