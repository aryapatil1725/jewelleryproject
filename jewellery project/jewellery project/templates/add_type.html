<!DOCTYPE html>
<html>
<head>
    <title>Add Jewellery Type</title>
    <link href="../static/bootstrap.css" rel="stylesheet"/>
    <link href="../static/style.css" rel="stylesheet"/>
</head>
<body>

<div class="container mt-5">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header">
            <h3 class="mb-0">✨ Add Jewellery Type</h3>
        </div>
        <div class="card-body">
            <form method="post">

                <div class="mb-3">
                    <label class="form-label">Type Name</label>
                    <input type="text" name="typename" class="form-control" placeholder="Enter jewellery type" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        Save Type
                    </button>
                    <a href="/typelist" class="btn btn-info">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
