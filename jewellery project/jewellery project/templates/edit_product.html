<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: #FFFFFF;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .edit-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
            border: 2px solid #F0C75E;
            max-width: 700px;
            margin: 0 auto;
        }
        .edit-container h2 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #D4AF37, #C5A028);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding-bottom: 15px;
            border-bottom: 3px solid #F0C75E;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #1a1a2e;
            font-weight: 600;
            font-size: 1.1em;
        }
        .form-control, .form-select {
            width: 100% !important;
            padding: 12px 15px;
            border: 2px solid #F0C75E;
            border-radius: 10px;
            transition: all 0.3s ease;
            background: white;
        }
        .form-control:focus, .form-select:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 0.2rem rgba(212, 175, 55, 0.25);
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn-action {
            flex: 1;
            padding: 12px;
            font-size: 1.1em;
        }
        .btn-primary {
            background: linear-gradient(135deg, #D4AF37, #C5A028);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #C5A028, #B8941F);
        }
    </style>
</head>
<body>

<div class="edit-container">
    <h2>Edit Product</h2>

    <form method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="pname">Product Name</label>
            <input type="text" name="pname" id="pname" class="form-control" value="{{ product.ProductName }}" required>
        </div>

        <div class="form-group">
            <label for="typeid">Type</label>
            <select name="typeid" id="typeid" class="form-select" required>
                {% for t in typelist %}
                    <option value="{{ t.TypeId }}"
                    {% if t.TypeId == product.TypeID %} selected {% endif %}>
                    {{ t.TypeName }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="gender">Gender</label>
            <input type="text" name="gender" id="gender" class="form-control" value="{{ product.ForGender }}" required>
        </div>

        <div class="form-group">
            <label for="weight">Weight</label>
            <input type="text" name="weight" id="weight" class="form-control" value="{{ product.Weight }}" required>
        </div>

        <div class="form-group">
            <label for="qty">Quantity</label>
            <input type="number" name="qty" id="qty" class="form-control" value="{{ product.QuantityInStock }}" required>
        </div>

        <div class="form-group">
            <label for="desc">Description</label>
            <input type="text" name="desc" id="desc" class="form-control" value="{{ product.Description }}" required>
        </div>

        <div class="form-group">
            <label for="photo1">Photo</label>
            {% if product.Photo %}
                <img src="{{ url_for('static', filename='uploads/' + product.Photo) }}" alt="Current Photo" style="max-width: 200px; margin-bottom: 10px; border-radius: 10px;">
                <br>
                <small style="color: #666; margin-bottom: 10px; display: block;">Current photo: {{ product.Photo }}</small>
            {% endif %}
            <input type="file" name="photo1" id="photo1" class="form-control">
            <input type="hidden" name="existing_photo" value="{{ product.Photo }}">
        </div>

        <div class="button-group">
            <button type="submit" class="btn btn-primary btn-action">Update</button>
            <a href="/productlist" class="btn btn-secondary btn-action">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
