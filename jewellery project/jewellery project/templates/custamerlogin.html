<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Login</title>
    <link href="../static/bootstrap.css" rel="stylesheet"/>
    <link href="../static/style.css" rel="stylesheet"/>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 50%, #d4af37 100%);
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            border: 2px solid #F0C75E;
            max-width: 500px;
            width: 100%;
        }
        .login-container h4 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #D4AF37, #C5A028);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.75rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1a1a2e;
            font-weight: 600;
        }
        .form-control {
            width: 100% !important;
            border: 2px solid #F0C75E;
            transition: all 0.3s ease;
            border-radius: 8px;
            padding: 10px;
        }
        .form-control:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 0.2rem rgba(212, 175, 55, 0.25);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(135deg, #D4AF37, #C5A028);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #C5A028, #B8941F);
            transform: translateY(-2px);
        }
        .error-message {
            color: #dc3545;
            text-align: center;
            margin-top: 15px;
            font-weight: 500;
        }
        .success-message {
            color: #28a745;
            text-align: center;
            margin-top: 15px;
            font-weight: 500;
        }
        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: #D4AF37;
            cursor: pointer;
            font-weight: 500;
        }
        .toggle-link:hover {
            color: #B8941F;
            text-decoration: underline;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <!-- Login Form -->
    <div id="loginForm">
        <h4>Customer Login</h4>

        <form method="post" action="/custamerlogin">
            <div class="form-group">
                <label for="email">Email ID</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-login">Login</button>
        </form>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <div class="toggle-link">
            Don't have an account? <span onclick="toggleForms()">Register here</span>
        </div>
    </div>

    <!-- Registration Form -->
    <div id="registerForm" class="hidden">
        <h4>Customer Registration</h4>

        <form method="post" action="/customerregister">
            <div class="form-group">
                <label for="reg_name">Full Name</label>
                <input type="text" name="name" id="reg_name" class="form-control" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="reg_email">Email ID</label>
                <input type="email" name="email" id="reg_email" class="form-control" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label for="reg_password">Password</label>
                <input type="password" name="password" id="reg_password" class="form-control" placeholder="Create password" required>
            </div>

            <div class="form-group">
                <label for="reg_confirm_password">Confirm Password</label>
                <input type="password" name="confirm_password" id="reg_confirm_password" class="form-control" placeholder="Confirm password" required>
            </div>

            <div class="form-group">
                <label for="reg_phone">Phone Number</label>
                <input type="tel" name="phone" id="reg_phone" class="form-control" placeholder="Enter phone number" required pattern="[0-9]{10}">
            </div>

            <div class="form-group">
                <label for="reg_address">Address</label>
                <textarea name="address" id="reg_address" class="form-control" rows="3" placeholder="Enter your address" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-login">Register</button>
        </form>

        {% if success %}
        <div class="success-message">
            {{ success }}
        </div>
        {% endif %}

        {% if reg_error %}
        <div class="error-message">
            {{ reg_error }}
        </div>
        {% endif %}

        <div class="toggle-link">
            Already have an account? <span onclick="toggleForms()">Login here</span>
        </div>
    </div>
</div>

<script>
function toggleForms() {
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    
    if (loginForm.classList.contains('hidden')) {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
    } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
    }
}
</script>

</body>
</html>
