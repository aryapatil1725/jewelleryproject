<!DOCTYPE html>
<html>
<head>
    <title>Payment List</title>
    <link href="../static/bootstrap.css" rel="stylesheet"/>
    <link href="../static/style.css" rel="stylesheet"/>
</head>
<body>

<div class="container mt-5">
    <div class="card">
        <div class="card-header">
            <h3 class="mb-0">💳 Payment List</h3>
        </div>
        <div class="card-body">
            <a href="/payment/add" class="btn btn-primary mb-3">
                <i class="fas fa-plus"></i> Add Payment
            </a>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Order ID</th>
                            <th>Payment Date</th>
                            <th>Amount Paid</th>
                            <th>Payment Method</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in payments %}
                        <tr>
                            <td><strong>{{ p.PaymentID }}</strong></td>
                            <td>{{ p.OrderID }}</td>
                            <td>{{ p.PaymentDate }}</td>
                            <td>₹{{ "%.2f"|format(p.AmountPaid) }}</td>
                            <td>{{ p.PaymentMethod }}</td>
                            <td>
                                <a href="/payment/edit/{{ p.PaymentID }}" class="btn btn-warning btn-sm">
                                    Edit
                                </a>
                                <a href="/payment/delete/{{ p.PaymentID }}" class="btn btn-danger btn-sm"
                                   onclick="return confirm('Are you sure you want to delete this payment?')">
                                    Delete
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
